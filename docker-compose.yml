services:
  db:
    image: postgres:16-alpine
    environment: {POSTGRES_DB: channelbridge, POSTGRES_USER: channelbridge, POSTGRES_PASSWORD: channelbridge}
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U channelbridge"], interval: 5s, timeout: 3s, retries: 20}
    volumes: [channelbridge-db:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    healthcheck: {test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 20}
  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment: {MINIO_ROOT_USER: channelbridge, MINIO_ROOT_PASSWORD: channelbridge-local-only}
    volumes: [channelbridge-objects:/data]
  api:
    build: {context: ., dockerfile: backend/Dockerfile}
    environment: {DATABASE_URL: postgresql+psycopg://channelbridge:channelbridge@db:5432/channelbridge, JWT_SECRET: compose-demo-secret-change-me, STORAGE_PATH: /app/storage}
    ports: ["8000:8000"]
    depends_on: {db: {condition: service_healthy}}
    healthcheck: {test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/health')"], interval: 10s, timeout: 4s, retries: 15}
  worker:
    build: {context: ., dockerfile: backend/Dockerfile}
    command: python -m app.worker
    environment: {DATABASE_URL: postgresql+psycopg://channelbridge:channelbridge@db:5432/channelbridge, STORAGE_PATH: /app/storage}
    depends_on: {db: {condition: service_healthy}, redis: {condition: service_healthy}}
  webhook-simulator:
    build: {context: ., dockerfile: backend/Dockerfile}
    command: uvicorn app.webhook_receiver:app --host 0.0.0.0 --port 8090
    ports: ["8090:8090"]
  frontend:
    build: {context: ., dockerfile: frontend/Dockerfile}
    environment: {VITE_API_URL: http://localhost:8000/api/v1}
    ports: ["5173:5173"]
    depends_on: {api: {condition: service_healthy}}
volumes: {channelbridge-db: {}, channelbridge-objects: {}}

